<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glosario IA — Storm Knowledge Base</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.08);
    --border-hover: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6b65;
    --text-hint: #9c9c96;
    --accent: #4f46e5;
    --accent-bg: #eef2ff;
    --accent-text: #3730a3;
    --radius: 12px;
    --radius-sm: 8px;
    --radius-pill: 20px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1e1e1c;
      --surface2: #252523;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.2);
      --text: #f0efe9;
      --text-muted: #9c9c96;
      --text-hint: #6b6b65;
      --accent: #818cf8;
      --accent-bg: #1e1b4b;
      --accent-text: #a5b4fc;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 2rem 2rem 1.5rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .header h1 span {
    color: var(--text-muted);
    font-weight: 400;
  }
  .badge-count {
    font-size: 12px;
    color: var(--accent-text);
    background: var(--accent-bg);
    padding: 3px 10px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
  }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 1rem;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-hint);
    pointer-events: none;
  }
  #search {
    width: 100%;
    height: 40px;
    padding: 0 16px 0 38px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-hint); }

  /* Filters */
  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .filter-btn {
    font-size: 12px;
    padding: 5px 14px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-pill);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* Main */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
  }

  .results-info {
    font-size: 13px;
    color: var(--text-hint);
    margin-bottom: 1rem;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 10px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }
  .card:hover {
    border-color: var(--border-hover);
  }
  .card.open {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px color-mix(in srgb, var(--accent) 12%, transparent);
  }

  .card-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 4px;
  }
  .card-acronym {
    font-size: 20px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .card.open .card-acronym { color: var(--accent); }

  .cat-tag {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: var(--radius-pill);
    white-space: nowrap;
    flex-shrink: 0;
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .card-full {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 6px;
  }

  /* Expanded */
  .card-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 0.5px solid var(--border);
  }
  .card.open .card-detail { display: block; }

  .detail-section {
    margin-bottom: 10px;
  }
  .detail-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent-text);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 3px;
  }
  .detail-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .card-chevron {
    display: inline-block;
    font-size: 14px;
    color: var(--text-hint);
    float: right;
    margin-top: 2px;
    transition: transform 0.2s;
  }
  .card.open .card-chevron { transform: rotate(180deg); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-hint);
    font-size: 15px;
    grid-column: 1 / -1;
  }
  .empty span { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

  /* Category colors */
  .cat-modelos   { background: #eef2ff; color: #3730a3; }
  .cat-tecnico   { background: #f0fdf4; color: #166534; }
  .cat-agentes   { background: #fffbeb; color: #92400e; }
  .cat-hardware  { background: #fef2f2; color: #991b1b; }
  .cat-negocio   { background: #faf5ff; color: #6b21a8; }
  .cat-legal     { background: #fff7ed; color: #9a3412; }
  .cat-seguridad { background: #fef9c3; color: #713f12; }
  .cat-ciencia   { background: #ecfdf5; color: #065f46; }

  @media (prefers-color-scheme: dark) {
    .cat-modelos   { background: #1e1b4b; color: #a5b4fc; }
    .cat-tecnico   { background: #052e16; color: #86efac; }
    .cat-agentes   { background: #1c1400; color: #fcd34d; }
    .cat-hardware  { background: #1c0a0a; color: #fca5a5; }
    .cat-negocio   { background: #2e1065; color: #d8b4fe; }
    .cat-legal     { background: #1c0a00; color: #fdba74; }
    .cat-seguridad { background: #1c1800; color: #fde68a; }
    .cat-ciencia   { background: #012a1a; color: #6ee7b7; }
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 1rem;
    font-size: 12px;
    color: var(--text-hint);
    border-top: 0.5px solid var(--border);
    margin-top: 2rem;
  }
</style>
</head>

// Remove duplicates by acronym (keep first occurrence)
const seen = new Set();
const terms_unique = terms.filter(t => {
  if (seen.has(t.acronym)) return false;
  seen.add(t.acronym);
  return true;
});

const cats = {
  modelos:   { label: "Modelos", cls: "cat-modelos" },
  tecnico:   { label: "Técnico", cls: "cat-tecnico" },
  agentes:   { label: "Agentes", cls: "cat-agentes" },
  hardware:  { label: "Hardware", cls: "cat-hardware" },
  negocio:   { label: "Negocio", cls: "cat-negocio" },
  legal:     { label: "Legal",   cls: "cat-legal" },
  seguridad: { label: "Seguridad", cls: "cat-seguridad" },
  ciencia:   { label: "Ciencia", cls: "cat-ciencia" },
};

let activeFilter = "all";
let openCard = null;

function buildFilters() {
  const f = document.getElementById("filters");
  const allBtn = document.createElement("button");
  allBtn.className = "filter-btn active";
  allBtn.textContent = "Todos";
  allBtn.dataset.cat = "all";
  allBtn.onclick = () => setFilter("all", allBtn);
  f.appendChild(allBtn);

  Object.entries(cats).forEach(([key, val]) => {
    const btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.textContent = val.label;
    btn.dataset.cat = key;
    btn.onclick = () => setFilter(key, btn);
    f.appendChild(btn);
  });
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  if (btn) btn.classList.add("active");
  render();
}

function render() {
  const q = document.getElementById("search").value.toLowerCase().trim();
  const filtered = terms_unique.filter(t => {
    const matchCat = activeFilter === "all" || t.cat === activeFilter;
    const matchQ = !q || t.acronym.toLowerCase().includes(q)
      || t.full.toLowerCase().includes(q)
      || t.desc.toLowerCase().includes(q)
      || (t.detail && t.detail.toLowerCase().includes(q));
    return matchCat && matchQ;
  });

  document.getElementById("badge").textContent = terms_unique.length + " términos";
  document.getElementById("info").textContent =
    filtered.length === terms_unique.length
      ? `${terms_unique.length} acrónimos`
      : `${filtered.length} de ${terms_unique.length} acrónimos`;

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty"><span>🔍</span>Sin resultados para esa búsqueda.</div>';
    return;
  }

  filtered.forEach(t => {
    const catInfo = cats[t.cat] || { label: t.cat, cls: "" };
    const isOpen = openCard === t.acronym;
    const card = document.createElement("div");
    card.className = "card" + (isOpen ? " open" : "");
    card.innerHTML = `
      <div class="card-head">
        <div class="card-acronym">${t.acronym}</div>
        <span class="cat-tag ${catInfo.cls}">${catInfo.label}</span>
      </div>
      <div class="card-full">${t.full}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-detail">
        ${t.detail ? `<div class="detail-section"><div class="detail-label">¿Qué es?</div><div class="detail-text">${t.detail}</div></div>` : ""}
        ${t.docs ? `<div class="detail-section"><div class="detail-label">En tus documentos</div><div class="detail-text">${t.docs}</div></div>` : ""}
      </div>
    `;
    card.onclick = () => {
      openCard = openCard === t.acronym ? null : t.acronym;
      render();
    };
    grid.appendChild(card);
  });
}

document.getElementById("search").addEventListener("input", render);
buildFilters();
render();
